<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trener Fizyki — logowanie</title>
  <link rel="stylesheet" href="css/style.css?v=3" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔋</text></svg>" />
  <style>
    .login-wrap { min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .login-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 32px; width: 100%; max-width: 420px; box-shadow: var(--shadow); }
    .login-card h1 { margin: 0 0 6px; font-size: 26px; text-align: center; }
    .login-card .subtitle { color: var(--muted); text-align: center; margin: 0 0 22px; font-size: 14px; }
    .form-row { margin-bottom: 16px; }
    .form-row label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 14px; }
    .form-row input { width: 100%; padding: 12px; font-size: 16px; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; font-family: inherit; }
    .form-row input:focus { outline: 2px solid var(--primary); border-color: var(--primary); }
    .login-btn { width: 100%; padding: 12px; }
    .err { background: var(--bad-bg); color: var(--bad); padding: 10px; border-radius: 8px; margin-bottom: 12px; font-size: 14px; display: none; }
    .err.show { display: block; }
    .login-hint { font-size: 12px; color: var(--muted); text-align: center; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <h1>🔋 Trener Fizyki</h1>
      <p class="subtitle">Zaloguj się, żeby kontynuować naukę</p>
      <div class="err" id="err"></div>
      <form id="loginForm">
        <div class="form-row">
          <label for="login">Login</label>
          <input id="login" name="login" type="text" autocomplete="username" autocapitalize="none" required />
        </div>
        <div class="form-row">
          <label for="password">Hasło</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn primary login-btn">Zaloguj</button>
      </form>
      <p class="login-hint">Twoje postępy są zapisywane na serwerze — możesz logować się z dowolnego urządzenia.</p>
    </div>
  </div>
  <script>
    const form = document.getElementById("loginForm");
    const err = document.getElementById("err");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      err.classList.remove("show");
      const data = {
        login: form.login.value.trim(),
        password: form.password.value
      };
      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
          credentials: "same-origin"
        });
        const j = await res.json();
        if (res.ok) {
          location.href = j.role === "admin" ? "/admin.html" : "/";
        } else {
          err.textContent = j.error || "Coś poszło nie tak";
          err.classList.add("show");
        }
      } catch (e) {
        err.textContent = "Błąd połączenia z serwerem";
        err.classList.add("show");
      }
    });
  </script>
</body>
</html>
