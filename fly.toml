# fly.toml — konfiguracja Fly.io dla Trenera Fizyki
app = "fizyka-trener"
primary_region = "fra"  # Frankfurt - najbliższy Polski region

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  DATA_DIR = "/data"

# UWAGA: tylko jedna maszyna, bo SQLite trzyma stan na lokalnym wolumenie.
# Dwie maszyny → dwie kopie bazy → niespójność. Dla obciążenia 1-2 osób to nie problem.
[[mounts]]
  source = "fizyka_data"
  destination = "/data"
  initial_size = "1gb"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
