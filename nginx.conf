server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Kompresja
    gzip on;
    gzip_types text/plain text/css application/javascript text/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # Krótki cache (5 min) z must-revalidate dla JS/CSS — dzięki temu
    # zmiany w aplikacji szybko docierają do uczących się użytkowników
    location ~* \.(js|css)$ {
        expires 5m;
        add_header Cache-Control "public, max-age=300, must-revalidate";
    }

    # HTML zawsze świeży (żeby nie cache'owało starych referencji)
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
        expires 0;
    }

    # Obrazki, fonty mogą być cache'owane długo
    location ~* \.(svg|ico|png|jpg|jpeg|gif|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location / {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    location = /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
